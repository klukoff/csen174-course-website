<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">

  <!-- Background -->
  <rect width="1200" height="560" fill="#fafafa" rx="12"/>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1e1b4b">Course Arc: Diverge, Converge, Diverge, Converge</text>

  <!-- Phase labels bar matching website -->
  <rect x="30" y="56" width="340" height="28" rx="4" fill="#6366f1" opacity="0.12"/>
  <text x="200" y="75" text-anchor="middle" font-size="12" font-weight="600" fill="#4338ca" letter-spacing="0.5">EXPLORE  (Weeks 1 - 3)</text>

  <rect x="385" y="56" width="180" height="28" rx="4" fill="#d97706" opacity="0.12"/>
  <text x="475" y="75" text-anchor="middle" font-size="12" font-weight="600" fill="#b45309" letter-spacing="0.5">COMMIT  (Week 4)</text>

  <rect x="580" y="56" width="310" height="28" rx="4" fill="#059669" opacity="0.12"/>
  <text x="735" y="75" text-anchor="middle" font-size="12" font-weight="600" fill="#047857" letter-spacing="0.5">BUILD  (Weeks 5 - 8)</text>

  <rect x="905" y="56" width="265" height="28" rx="4" fill="#7c3aed" opacity="0.12"/>
  <text x="1037" y="75" text-anchor="middle" font-size="12" font-weight="600" fill="#6d28d9" letter-spacing="0.5">SHIP  (Weeks 9 - 10)</text>


  <!-- ==================== -->
  <!-- INDIVIDUAL / TEAM BADGES -->
  <!-- ==================== -->

  <!-- Week 1: Individual badge -->
  <rect x="30" y="100" width="80" height="20" rx="10" fill="#6366f1" opacity="0.15"/>
  <text x="70" y="114" text-anchor="middle" font-size="9" font-weight="600" fill="#4338ca">INDIVIDUAL</text>

  <!-- Week 2 vision: Team badge -->
  <rect x="258" y="100" width="52" height="20" rx="10" fill="#d97706" opacity="0.15"/>
  <text x="284" y="114" text-anchor="middle" font-size="9" font-weight="600" fill="#b45309">TEAM</text>

  <!-- Week 3: Individual badge -->
  <rect x="422" y="100" width="80" height="20" rx="10" fill="#6366f1" opacity="0.15"/>
  <text x="462" y="114" text-anchor="middle" font-size="9" font-weight="600" fill="#4338ca">INDIVIDUAL</text>

  <!-- Week 4+: Team badge -->
  <rect x="618" y="100" width="52" height="20" rx="10" fill="#d97706" opacity="0.15"/>
  <text x="644" y="114" text-anchor="middle" font-size="9" font-weight="600" fill="#b45309">TEAM</text>


  <!-- ==================== -->
  <!-- WEEK 1: 4 STUDENTS → 3 IDEAS EACH (DIVERGE) -->
  <!-- ==================== -->

  <!-- Week 1 label -->
  <text x="65" y="145" text-anchor="middle" font-size="12" font-weight="600" fill="#4338ca">Week 1</text>
  <text x="65" y="160" text-anchor="middle" font-size="10" fill="#64748b">Individual</text>
  <text x="65" y="173" text-anchor="middle" font-size="10" fill="#64748b">Exploration</text>

  <!-- Student A → 3 ideas -->
  <circle cx="50" cy="210" r="12" fill="#6366f1"/>
  <text x="50" y="214" text-anchor="middle" font-size="10" font-weight="700" fill="white">A</text>
  <line x1="62" y1="204" x2="102" y2="190" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
  <line x1="62" y1="210" x2="102" y2="210" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
  <line x1="62" y1="216" x2="102" y2="230" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
  <circle cx="108" cy="190" r="5" fill="#6366f1" opacity="0.3"/>
  <circle cx="108" cy="210" r="5" fill="#6366f1" opacity="0.3"/>
  <circle cx="108" cy="230" r="5" fill="#6366f1" opacity="0.3"/>

  <!-- Student B → 3 ideas -->
  <circle cx="50" cy="280" r="12" fill="#6366f1"/>
  <text x="50" y="284" text-anchor="middle" font-size="10" font-weight="700" fill="white">B</text>
  <line x1="62" y1="274" x2="102" y2="260" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
  <line x1="62" y1="280" x2="102" y2="280" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
  <line x1="62" y1="286" x2="102" y2="300" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
  <circle cx="108" cy="260" r="5" fill="#6366f1" opacity="0.3"/>
  <circle cx="108" cy="280" r="5" fill="#6366f1" opacity="0.3"/>
  <circle cx="108" cy="300" r="5" fill="#6366f1" opacity="0.3"/>

  <!-- Student C → 3 ideas -->
  <circle cx="50" cy="350" r="12" fill="#6366f1"/>
  <text x="50" y="354" text-anchor="middle" font-size="10" font-weight="700" fill="white">C</text>
  <line x1="62" y1="344" x2="102" y2="330" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
  <line x1="62" y1="350" x2="102" y2="350" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
  <line x1="62" y1="356" x2="102" y2="370" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
  <circle cx="108" cy="330" r="5" fill="#6366f1" opacity="0.3"/>
  <circle cx="108" cy="350" r="5" fill="#6366f1" opacity="0.3"/>
  <circle cx="108" cy="370" r="5" fill="#6366f1" opacity="0.3"/>

  <!-- Student D → 3 ideas -->
  <circle cx="50" cy="420" r="12" fill="#6366f1"/>
  <text x="50" y="424" text-anchor="middle" font-size="10" font-weight="700" fill="white">D</text>
  <line x1="62" y1="414" x2="102" y2="400" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
  <line x1="62" y1="420" x2="102" y2="420" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
  <line x1="62" y1="426" x2="102" y2="440" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
  <circle cx="108" cy="400" r="5" fill="#6366f1" opacity="0.3"/>
  <circle cx="108" cy="420" r="5" fill="#6366f1" opacity="0.3"/>
  <circle cx="108" cy="440" r="5" fill="#6366f1" opacity="0.3"/>

  <!-- "3 ideas each" annotation -->
  <text x="122" y="185" font-size="9" fill="#94a3b8" font-style="italic">3 ideas</text>
  <text x="122" y="196" font-size="9" fill="#94a3b8" font-style="italic">each</text>


  <!-- ==================== -->
  <!-- WEEK 2: PITCHES → CONVERGE TO TEAM VISION -->
  <!-- ==================== -->

  <!-- Convergence lines: ideas → pitch nodes -->
  <line x1="113" y1="210" x2="173" y2="235" stroke="#818cf8" stroke-width="1.2" opacity="0.3"/>
  <line x1="113" y1="280" x2="173" y2="285" stroke="#818cf8" stroke-width="1.2" opacity="0.3"/>
  <line x1="113" y1="350" x2="173" y2="345" stroke="#818cf8" stroke-width="1.2" opacity="0.3"/>
  <line x1="113" y1="420" x2="173" y2="395" stroke="#818cf8" stroke-width="1.2" opacity="0.3"/>

  <!-- Pitch nodes -->
  <circle cx="180" cy="235" r="7" fill="#818cf8"/>
  <circle cx="180" cy="285" r="7" fill="#818cf8"/>
  <circle cx="180" cy="345" r="7" fill="#818cf8"/>
  <circle cx="180" cy="395" r="7" fill="#818cf8"/>

  <!-- Pitch label -->
  <text x="180" y="200" text-anchor="middle" font-size="11" font-weight="600" fill="#4338ca">Week 2</text>
  <text x="180" y="214" text-anchor="middle" font-size="10" fill="#64748b">Pitches</text>

  <!-- Convergence lines: pitches → team vision -->
  <line x1="187" y1="235" x2="268" y2="310" stroke="#d97706" stroke-width="1.5" opacity="0.35"/>
  <line x1="187" y1="285" x2="268" y2="313" stroke="#d97706" stroke-width="1.5" opacity="0.35"/>
  <line x1="187" y1="345" x2="268" y2="317" stroke="#d97706" stroke-width="1.5" opacity="0.35"/>
  <line x1="187" y1="395" x2="268" y2="320" stroke="#d97706" stroke-width="1.5" opacity="0.35"/>

  <!-- Team Vision node -->
  <circle cx="295" cy="315" r="26" fill="#d97706"/>
  <text x="295" y="310" text-anchor="middle" font-size="11" font-weight="700" fill="white">Shared</text>
  <text x="295" y="324" text-anchor="middle" font-size="11" font-weight="700" fill="white">Vision</text>

  <text x="295" y="268" text-anchor="middle" font-size="11" font-weight="600" fill="#b45309">Week 2</text>
  <text x="295" y="282" text-anchor="middle" font-size="10" fill="#64748b">Converge</text>


  <!-- ==================== -->
  <!-- WEEK 3: DIVERGE TO 4 PROTOTYPES -->
  <!-- ==================== -->

  <!-- Divergence lines from team vision to prototypes -->
  <line x1="321" y1="305" x2="403" y2="210" stroke="#059669" stroke-width="1.8" opacity="0.4"/>
  <line x1="321" y1="310" x2="403" y2="280" stroke="#059669" stroke-width="1.8" opacity="0.4"/>
  <line x1="321" y1="320" x2="403" y2="350" stroke="#059669" stroke-width="1.8" opacity="0.4"/>
  <line x1="321" y1="325" x2="403" y2="420" stroke="#059669" stroke-width="1.8" opacity="0.4"/>

  <!-- Prototype boxes with student identity -->
  <!-- Each has a person icon (circle) + letter to show it's an individual student's work -->

  <!-- Student A's prototype -->
  <rect x="403" y="196" width="125" height="28" rx="6" fill="#059669"/>
  <circle cx="418" cy="210" r="9" fill="white" opacity="0.2"/>
  <text x="418" y="214" text-anchor="middle" font-size="9" font-weight="700" fill="white">A</text>
  <text x="475" y="214" text-anchor="middle" font-size="10" font-weight="600" fill="white">A's Prototype</text>

  <!-- Student B's prototype -->
  <rect x="403" y="266" width="125" height="28" rx="6" fill="#059669"/>
  <circle cx="418" cy="280" r="9" fill="white" opacity="0.2"/>
  <text x="418" y="284" text-anchor="middle" font-size="9" font-weight="700" fill="white">B</text>
  <text x="475" y="284" text-anchor="middle" font-size="10" font-weight="600" fill="white">B's Prototype</text>

  <!-- Student C's prototype -->
  <rect x="403" y="336" width="125" height="28" rx="6" fill="#059669"/>
  <circle cx="418" cy="350" r="9" fill="white" opacity="0.2"/>
  <text x="418" y="354" text-anchor="middle" font-size="9" font-weight="700" fill="white">C</text>
  <text x="475" y="354" text-anchor="middle" font-size="10" font-weight="600" fill="white">C's Prototype</text>

  <!-- Student D's prototype -->
  <rect x="403" y="406" width="125" height="28" rx="6" fill="#059669"/>
  <circle cx="418" cy="420" r="9" fill="white" opacity="0.2"/>
  <text x="418" y="424" text-anchor="middle" font-size="9" font-weight="700" fill="white">D</text>
  <text x="475" y="424" text-anchor="middle" font-size="10" font-weight="600" fill="white">D's Prototype</text>

  <!-- Week 3 label -->
  <text x="465" y="155" text-anchor="middle" font-size="11" font-weight="600" fill="#047857">Week 3</text>
  <text x="465" y="169" text-anchor="middle" font-size="10" fill="#64748b">Divergent</text>
  <text x="465" y="182" text-anchor="middle" font-size="10" fill="#64748b">Prototypes</text>

  <!-- Annotation: same vision, different approaches -->
  <text x="465" y="454" text-anchor="middle" font-size="9" fill="#94a3b8" font-style="italic">Same vision,</text>
  <text x="465" y="465" text-anchor="middle" font-size="9" fill="#94a3b8" font-style="italic">different approaches</text>


  <!-- ==================== -->
  <!-- WEEK 4: GALLERY WALK → COMMIT -->
  <!-- ==================== -->

  <!-- Lines from prototypes to gallery walk -->
  <line x1="528" y1="210" x2="590" y2="288" stroke="#059669" stroke-width="1.3" opacity="0.3"/>
  <line x1="528" y1="280" x2="590" y2="300" stroke="#059669" stroke-width="1.3" opacity="0.3"/>
  <line x1="528" y1="350" x2="590" y2="312" stroke="#059669" stroke-width="1.3" opacity="0.3"/>
  <line x1="528" y1="420" x2="590" y2="324" stroke="#059669" stroke-width="1.3" opacity="0.3"/>

  <!-- Gallery walk / Commit node -->
  <rect x="590" y="280" width="115" height="48" rx="8" fill="white" stroke="#d97706" stroke-width="2.5"/>
  <text x="647" y="301" text-anchor="middle" font-size="11" font-weight="600" fill="#b45309">Gallery Walk</text>
  <text x="647" y="317" text-anchor="middle" font-size="10" fill="#64748b">Pick direction</text>

  <text x="647" y="260" text-anchor="middle" font-size="11" font-weight="600" fill="#b45309">Week 4</text>
  <text x="647" y="274" text-anchor="middle" font-size="10" fill="#64748b">Commit</text>

  <!-- Arrow from gallery walk to build -->
  <line x1="705" y1="304" x2="753" y2="304" stroke="#059669" stroke-width="2.5" opacity="0.5"/>
  <polygon points="751,297 765,304 751,311" fill="#059669" opacity="0.5"/>


  <!-- ==================== -->
  <!-- WEEKS 5-8: BUILD -->
  <!-- ==================== -->

  <rect x="768" y="267" width="220" height="74" rx="12" fill="#059669"/>
  <text x="878" y="295" text-anchor="middle" font-size="15" font-weight="700" fill="white">Build</text>
  <text x="878" y="313" text-anchor="middle" font-size="11" fill="white" opacity="0.85">One engineered product</text>
  <text x="878" y="329" text-anchor="middle" font-size="11" fill="white" opacity="0.85">Weeks 5 - 8</text>

  <!-- Build milestones -->
  <text x="798" y="365" font-size="9" fill="#64748b">W5 Architecture</text>
  <text x="798" y="379" font-size="9" fill="#64748b">W6 Testing</text>
  <text x="908" y="365" font-size="9" fill="#64748b">W7 CI/CD</text>
  <text x="908" y="379" font-size="9" fill="#64748b">W8 Security</text>

  <!-- Arrow from build to ship -->
  <line x1="988" y1="304" x2="1028" y2="304" stroke="#7c3aed" stroke-width="2.5" opacity="0.5"/>
  <polygon points="1026,297 1040,304 1026,311" fill="#7c3aed" opacity="0.5"/>


  <!-- ==================== -->
  <!-- WEEKS 9-10: SHIP -->
  <!-- ==================== -->

  <rect x="1043" y="267" width="140" height="74" rx="12" fill="#7c3aed"/>
  <text x="1113" y="295" text-anchor="middle" font-size="15" font-weight="700" fill="white">Ship</text>
  <text x="1113" y="313" text-anchor="middle" font-size="11" fill="white" opacity="0.85">Weeks 9 - 10</text>

  <!-- Ship milestones -->
  <text x="1058" y="365" font-size="9" fill="#64748b">W9 Ethics + Code Freeze</text>
  <text x="1058" y="379" font-size="9" fill="#64748b">W10 Demo Night</text>


  <!-- ==================== -->
  <!-- BOTTOM: DIVERGE / CONVERGE RHYTHM -->
  <!-- ==================== -->

  <!-- Dashed baseline -->
  <line x1="40" y1="510" x2="700" y2="510" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 4" opacity="0.25"/>

  <!-- Diverge 1 -->
  <line x1="45" y1="510" x2="115" y2="510" stroke="#6366f1" stroke-width="2" opacity="0.5"/>
  <polygon points="113,505 122,510 113,515" fill="#6366f1" opacity="0.5"/>
  <text x="80" y="502" text-anchor="middle" font-size="11" fill="#6366f1" font-weight="600" font-style="italic">Diverge</text>

  <!-- Converge 1 -->
  <line x1="155" y1="510" x2="255" y2="510" stroke="#d97706" stroke-width="2" opacity="0.5"/>
  <polygon points="253,505 262,510 253,515" fill="#d97706" opacity="0.5"/>
  <text x="205" y="502" text-anchor="middle" font-size="11" fill="#d97706" font-weight="600" font-style="italic">Converge</text>

  <!-- Diverge 2 -->
  <line x1="295" y1="510" x2="395" y2="510" stroke="#059669" stroke-width="2" opacity="0.5"/>
  <polygon points="393,505 402,510 393,515" fill="#059669" opacity="0.5"/>
  <text x="345" y="502" text-anchor="middle" font-size="11" fill="#059669" font-weight="600" font-style="italic">Diverge</text>

  <!-- Converge 2 -->
  <line x1="435" y1="510" x2="565" y2="510" stroke="#d97706" stroke-width="2" opacity="0.5"/>
  <polygon points="563,505 572,510 563,515" fill="#d97706" opacity="0.5"/>
  <text x="500" y="502" text-anchor="middle" font-size="11" fill="#d97706" font-weight="600" font-style="italic">Converge</text>

  <!-- Build + Ship label -->
  <line x1="605" y1="510" x2="695" y2="510" stroke="#7c3aed" stroke-width="2" opacity="0.5"/>
  <polygon points="693,505 702,510 693,515" fill="#7c3aed" opacity="0.5"/>
  <text x="650" y="502" text-anchor="middle" font-size="11" fill="#7c3aed" font-weight="600" font-style="italic">Build + Ship</text>


  <!-- ==================== -->
  <!-- LEGEND -->
  <!-- ==================== -->

  <circle cx="50" cy="540" r="7" fill="#6366f1"/>
  <text x="60" y="544" font-size="10" fill="#64748b">= individual student</text>
  <text x="200" y="544" font-size="10" fill="#64748b">A, B, C, D each represent one team member</text>

</svg>